#############################################################################################

# Circle packing in a square via Stochastic Relaxation with Perturbations (SRP)

[circle_packing_SRP]
# -------------------------
# Problem size & dataset
# -------------------------
# Number of circles per sample
num_circles = 26
# Number of samples to generate (dataset size)
num_samples = 3000

mode = generate

# -------------------------
# SRP (annealed exploration)
# -------------------------
# Outer SRP iterations and inner grad steps
srp_Imax = 400
srp_m = 30
# Annealing multiplier per outer iter (closer to 1.0 = slower cooling)
srp_beta = 0.99
# Backtracking steps if the loss increases
srp_backtrack = 5
# Base step sizes (absolute coords):
#   - center step in x/y
#   - radius step
srp_step_center = 0.05
srp_step_radius = 0.001

# -------------------------
# Objective weights
# -------------------------
# Overlap penalty between circles
w_overlap = 1000.0
# Wall (boundary) penalty for circles crossing the unit square
w_wall = 1000.0
# Coefficient for maximizing sum of radii (script minimizes -alpha * sum r)
alpha_sum_r = 0.2

# -------------------------
# Local L-BFGS-B refinement
# -------------------------
lbfgs_gtol = 1e-8
lbfgs_ftol = 1e-12
lbfgs_maxiter = 1000
lbfgs_maxcor = 20

# -------------------------
# Initialization
# -------------------------
# Initial radii and small random jitter
init_r0 = 0.01
init_r_jitter = 0.005

# -------------------------
# Output & plotting
# -------------------------
# Where tensors/CSVs will be written
output_dir = flow_boost/output/circles_in_square/training_sets
final_push_input = flow_boost/output/circles_in_square/generated_sets/flow_centers_only_gen_20251104_172505.pt
final_push_output = flow_boost/output/circles_in_square/fixed_gen_sets/

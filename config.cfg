save_generated_dir = flow_boost/output/spheres_in_cube_new/generated_sets

; If mode is sampling_only or retrain_and_sampling, point to an existing checkpoint
resume_model_path  = flow_boost/output/spheres_in_cube_new/saved_models/{DAY_DATE}/spheres_fm_loss=0.0000_{DATE}.pth

; =========================
; Geometry / problem setup
; =========================
dimension          = 12
num_spheres        = 31

; Radius and box range
sphere_radius      = 0.35
clip_sample_range  = 1.0   
boundary_mode      = reflect
; cube is [0,1]^d; periodic removes walls

; =========================
; Training hyperparameters
; =========================
batch_size         = 32

; Original LR & eta_min (eta_min is unused by schedulefree, but kept here as a note)
learning_rate      = 5e-4
eta_min            = 0.00000002

num_epochs         = 500

; Loss weights (kept from your config)
mse_strength              = 1.0
distance_penalty_strength = 4.0

; Train/test split and max number of samples used
test_fraction      = 0.01
split_seed         = 1234
max_samples        = 25000

; =========================
; Distance-penalty / time sampling knobs
; =========================
; penalty margin as fraction of radius
aux_margin_factor  = 0.02
; smooth hinge “beta” for overlaps
aux_beta           = 80.0
; top-q fraction of pairwise violations
aux_q              = 0.20

; time sampling bias towards small t (near data)
small_t_weight     = 0.5
small_t_gamma      = 2.0


; =========================
; Dataset precomputation
; =========================
; tolerance for detecting points on faces
face_tolerance     = 1e-4
; chunk size for min-separation precompute
minsep_chunk       = 256
; normalizing factor for N in conditioning vector
scale_N            = 128

; =========================
; Sampling settings (mapped from your old keys)
; =========================
; sample_new_points            = 100
; sample_new_points_batch_size = 10
num_generated_samples    = 800
generation_batch_size    = 100

; must match dataset N (you had 89 spheres)
; num_spheres already set above

; =========================
; GAS sampler hyperparams
; =========================
gas_steps          = 40
ode_method          = midpoint
ode_step_cap        = 0.05

gas_jitter         = 0.005
gas_eps_nrm        = 1e-6

proj_outer_iters    = 8
alpha_proj          = 0.25
contact_q           = 1.0

wall_weight         = 0.0
wall_margin         = 0.05

prox_iters          = 10
prox_step           = 0.1
prox_lambda         = 2.0

final_passes        = 6
tol_finish          = 1e-8

; -------------------------
; RG-CFM (reward-guided CFM)
; -------------------------
rg_learning_rate     = 2e-4
rg_sd_coefficient    = 0.6
rg_temperature       = 2.0
rg_grad_clip         = 0.8
rg_batch_size        = 256
rg_steps_per_epoch   = 128
rg_epochs            = 50
rg_weight_clip       = 15.0
rg_ref_path          = 

; Step size ≈ rg_explore_magnitude * sphere_radius
rg_explore_magnitude     = 0.040
rg_explore_contact_frac  = 0.92
rg_explore_local_frac    = 0.01
rg_explore_overlap_gain  = 2.5
rg_explore_scale_cap     = 4.0
rg_repair_after_explore  = True


; Debug / instrumentation
sampler_debug       = false
sampler_debug_every = 10

; =========================
; SetTransformer architecture
; =========================
; Your previous choices:
; st_dim_hidden  = 256
; st_num_heads   = 8
; st_num_inds    = 16  (not used by the new FlowSetTransformer)
; st_num_isab    = 2   -> mapped to depth=2 below

st_dim_hidden       = 256
st_num_heads        = 8
st_depth            = 2

st_attn_dropout     = 0.1
st_ff_dropout       = 0.1

; Time embedding (reasonable defaults)
st_dim_time         = 128
time_fourier_dim    = 64
time_hidden         = 256
time_fourier_sigma  = 1.0

; conditioning: [r/L, N_scaled, p_face, minsep/L]
cond_dim_in         = 4
cond_hidden         = 128

[spheres_in_cube_new_pipeline]
iterations = 1
# start_at_step must be one of: "start"(use this when you start the pipeline for the first time), "train_and_sampling"(use this when there is training data), "push"(use this when there are unpushed samples), "retrain_and_sampling"(same as train but with existing model)

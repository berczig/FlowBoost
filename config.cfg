##############################################################################################
#############################################################################################
# Spheres in a cube problem 



[sample_generation_PP+PBTS]
; -------------------------------
; GENERAL MODE
; -------------------------------
; Use "training_set_gen" to generate samples from random positions
; Use "final_push" to read an existing .pt file and push those samples
mode = training_set_gen
push_objective = max_minsep

; -------------------------------
; GEOMETRY / PACKING PARAMETERS
; -------------------------------
dimension          = 12
bounding_box_width = 1.0
sphere_radius      = 0.35
; If you don't have a better bound, set best_known_diameter = 2 * sphere_radius
best_known_diameter = 0.7

num_spheres = 31         
; N
num_samples = 600   
; M (per N when not using multiple_sphere_num mode)
physics_push_mode = false
; or False to disable eliminate_overlaps_box
dt       = 0.001
max_iter = 1000
tol      = 1e-8
boundary_mode = reflect   
; or "reflect", etc.; periodic disables wall push

; -------------------------------
; SRP PARAMETERS
; -------------------------------
num_srp_restarts = 5
srp_Imax       = 400      
; number of SRP outer iterations
srp_m          = 80       
; inner gradient steps per outer step
srp_sigma_frac = 0.2      
; sigma = srp_sigma_frac * L
srp_beta       = 0.99     
; multiplicative decay of eta

; Local optimizer after SRP (L-BFGS-B)
srp_tol      = 1e-8       
; both ftol and gtol in minimize options
srp_maxiter  = 300


; ============================
; OUTPUT FILES (TRAINING MODE)
; ============================
; Base filename for the full dataset (SRP + local opt [+ optional physics push])
; {DATE} will be replaced by N<NUM_SPHERES>_<timestamp>
; Example final: ./outputs_spheres/srp_data_N30_2025-11-26_101530.pt
output_filename = flow_boost/output/spheres_in_cube_new/training_sets/{DAY_DATE}/srp_data_{DATE}.pt

; Symmetrized version of the full dataset
; Example: ./outputs_spheres/srp_data_sym_N30_2025-11-26_101530.pt
output_filename_sym = flow_boost/output/spheres_in_cube_new/training_sets/{DAY_DATE}/srp_data_sym_{DATE}.pt

; Top subset (top ~25% by best min distance)
; Example: ./outputs_spheres/srp_top_N30_2025-11-26_101530.pt
output_filename_top = flow_boost/output/spheres_in_cube_new/training_sets/{DAY_DATE}/srp_top_{DATE}.pt
; Symmetrized version of the top subset
; Example: ./outputs_spheres/srp_top_sym_N30_2025-11-26_101530.pt
output_filename_sym_top = flow_boost/output/spheres_in_cube_new/training_sets/{DAY_DATE}/srp_top_sym_{DATE}.pt

; Metrics for *all* samples and all SRP restarts in training mode
; Example: ./outputs_spheres/srp_metrics_N30_2025-11-26_101530.csv
; The script will also create: srp_metrics_N30_..._top10.csv (top-10 smallest excess)
output_filename_metrics = flow_boost/output/spheres_in_cube_new/training_sets/{DAY_DATE}/srp_metrics_{DATE}.csv


; ============================
; INPUT / OUTPUT (FINAL PUSH)
; ============================
; INPUT: file to be pushed in "final_push" mode.
; Must be a .pt tensor of shape (M, D, N) or (M, N, D)
final_push_input = flow_boost/output/spheres_in_cube_new/generated_sets/{DAY_DATE}/spheres_gen_{NUM_SPHERES}x{POINTS_N}_{DATE}.pt
; OUTPUT DIRECTORY: where final pushed datasets and metrics go.
; The script will create:
;   spheres_srp_pushed_N<NUM_SPHERES>_<timestamp>.pt
;   spheres_metrics_pushed_N<NUM_SPHERES>_<timestamp>.csv
;   spheres_metrics_pushed_N<NUM_SPHERES>_<timestamp>_top10.csv
final_push_output = flow_boost/output/spheres_in_cube_new/final_pushed



[sample_generation_PP+PBTS_multiple_sphere_num]
; Toggle generation across a range of numbers of spheres
; When active = true and mode = training_set_gen,
; the script will loop over sphere counts from num_spheres_start to num_spheres_end
active = false

num_spheres_start = 10
num_spheres_end   = 20

; For each SPHERE_NUM and DATE (raw timestamp without N),
; the code will plug them in and then internally decorate DATE as N<SPHERE_NUM>_<timestamp>.
; Example effective dataset name for SPHERE_NUM=20:
;   ./outputs_spheres_multi/srp_data_20_N20_2025-11-26_101530.pt

; Full dataset for each sphere number
output_filename = ./outputs_spheres_multi/srp_data_{SPHERE_NUM}_{DATE}.pt

; Top subset for each sphere number
output_filename_top = ./outputs_spheres_multi/srp_top_{SPHERE_NUM}_{DATE}.pt

; Metrics for each sphere number (all samples, all restarts)
; The script will also write a *_top10.csv metrics file next to this.
output_filename_metrics = ./outputs_spheres_multi/srp_metrics_{SPHERE_NUM}_{DATE}.csv

; (Currently only read in multi-N driver; the main generator does not
; directly use this, but it’s kept for compatibility / bookkeeping.)
output_filename_metrics_excess = ./outputs_spheres_multi/srp_metrics_excess_{SPHERE_NUM}_{DATE}.csv


[flow_matching]

; =========================
; High-level run control
; =========================
; mode ∈ {training_and_sampling, sampling_only, retrain_and_sampling, rg_cfm}
mode = training_and_sampling
train_top_fraction = 0.2   
; keep top 50% by min pairwise distance


; Required: path to torch tensor (M, d, N)
dataset_path = flow_boost/output/spheres_in_cube_new/generated_sets\{DAY_DATE}/spheres_gen_{NUM_SPHERES}x{POINTS_N}_{DATE}.pt
; Directories for saving models & generated samples
; (replace these with whatever you prefer)

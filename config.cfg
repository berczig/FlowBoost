# -----------------------------
# SRP hyperparameters
# -----------------------------
srp_Imax        = 400
srp_m           = 30
srp_beta        = 0.985
srp_backtrack   = 3
srp_step_center = 0.05

# -----------------------------
# Smooth star discrepancy loss parameters
# -----------------------------
# Softmax sharpness schedule (larger -> closer to max)
beta_softmax_start = 10.0
beta_softmax_final = 200.0

# Sigmoid gate temperature for indicator approximation (smaller -> sharper)
tau_sigmoid = 0.01

# Small penalty for leaving the cube (L-BFGS-B also has bounds)
w_wall = 1e-8

# Smooth |.| epsilon
abs_eps = 1e-12

# -----------------------------
# Grid policy used inside SRP / loss
# -----------------------------
# "critical" -> Ax,Ay = unique point coords (+1), refreshed periodically
# "uniform"  -> Ax,Ay fixed uniform grid (grid_x, grid_y)
grid_mode = critical

# Only used if grid_mode = uniform (and also for some other choices below)
grid_x = 64
grid_y = 64

# Only used if grid_mode = critical:
# Refresh critical grid every ~ srp_Imax * grid_refresh_frac iterations
grid_refresh_frac = 0.10

# Optional tiny offset added to critical grid coords to avoid ties in smooth gates
critical_pad_eps = 0.0

# Optional speedup: evaluate only Top-K anchored boxes (largest |delta|) per step.
# 0 disables Top-K (uses all boxes).
topk_boxes = 0

# -----------------------------
# L-BFGS-B local refinement parameters
# -----------------------------
lbfgs_gtol    = 1e-8
lbfgs_ftol    = 1e-12
lbfgs_maxiter = 500
lbfgs_maxcor  = 20

# Which grid to use during L-BFGS-B.
# "uniform"  -> uniform_grid(grid_x, grid_y)
# "critical" -> critical_grid_from_points(current_pts)
lbfgs_grid_mode = uniform

# -----------------------------
# Metrics evaluation parameters
# -----------------------------
# The surrogate metric can be evaluated on a grid different from SRP/L-BFGS.
# Typically "uniform" for stable comparisons across samples.
eval_grid_mode = uniform
eval_grid_x = 64
eval_grid_y = 64

# If not set, defaults to beta_softmax_final / tau_sigmoid
beta_eval = 200.0
tau_eval  = 0.01


